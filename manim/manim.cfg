# Config local de Manim (se aplica al correr `manim` desde la carpeta manim/)
[CLI]
# El video final renderizado cae PLANO en video_2/  (ej: video_2/Beat6Pago.mp4)
video_dir = ./video_2
# El cache (frames parciales) queda en media/, que está en .gitignore
partial_movie_dir = {media_dir}/partial/{scene_name}
