# Config local de Manim (se aplica al correr `manim` desde la carpeta manim/)
[CLI]
# Los videos de montecarlo caen agrupados por calidad, todos juntos:
#   media/video_2/720p30/Beat6Pago.mp4   (los 6 beats en una sola carpeta)
video_dir = {media_dir}/video_2/{quality}
# El cache (frames parciales) queda aparte, en media/partial/, fuera de video_2
partial_movie_dir = {media_dir}/partial/{scene_name}
